name: US Market & AI Analysis

on:
  schedule:
    # 한국 시간(KST) 오전 6:30 = UTC 전날 오후 21:30 (월~금 KST 기준 화~토)
    - cron: '30 21 * * 1-5'
  workflow_dispatch:

jobs:
  update-us-and-analyze:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 코드 가져오기
        uses: actions/checkout@v4

      - name: Python 환경 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 필요한 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 구글 인증키 생성
        run: echo '${{ secrets.GOOGLE_CREDENTIALS }}' > credentials.json

      - name: 미국장 업데이트 및 AI 분석 (us 모드)
        env:
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python batch_daily.py us