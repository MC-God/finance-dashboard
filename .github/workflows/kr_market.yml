name: KR Market Update

on:
  schedule:
    - cron: '0 7 * * 1-5'
  workflow_dispatch:

jobs:
  update-kr-market:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 코드 가져오기
        uses: actions/checkout@v4

      - name: Python 환경 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 구글 인증키 생성
        run: echo '${{ secrets.GOOGLE_CREDENTIALS }}' > credentials.json

      - name: 🔒 구글 네임스페이스 충돌 강제 해결 및 패키지 설치
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          
          # 1. 기본 요구사항 설치 (이 과정에서 구버전 의존성이 섞여 들어옴)
          pip install --no-cache-dir -r requirements.txt
          
          # 2. 경로를 꼬이게 만드는 구글 코어 패키지들 강제 삭제
          pip uninstall -y google google-api-core googleapis-common-protos google-auth
          
          # 3. 최신 표준 방식으로 전부 다시 묶어서 재설치
          pip install --no-cache-dir --upgrade google-api-core googleapis-common-protos google-auth google-genai

      - name: 한국장 데이터 업데이트 (kr 모드)
        env:
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          source .venv/bin/activate
          python batch_daily.py kr