name: KR Market Update

on:
  schedule:
    # UTC 09:00 = KST 18:00 (오후 6시 한국장 마감 반영)
    - cron: '0 9 * * 1-5'
  workflow_dispatch:

jobs:
  update-kr-market:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 코드 가져오기
        uses: actions/checkout@v4

      - name: Python 환경 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 구글 인증키 생성
        run: echo '${{ secrets.GOOGLE_CREDENTIALS }}' > credentials.json

      - name: 한국장 데이터 업데이트 및 오후 스냅샷
        env:
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # 👇 텔레그램 푸시 알림을 위해 새로 추가된 부분 👇
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          ALLOWED_USER_IDS: ${{ secrets.ALLOWED_USER_IDS }}
        run: python batch_daily.py kr
